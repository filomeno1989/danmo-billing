<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danmo SS — Login</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:1rem;
  }
  .login-box {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:2.5rem; width:100%; max-width:420px;
    backdrop-filter:blur(10px);
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
  }
  .login-logo {
    text-align:center; margin-bottom:2rem;
  }
  .login-logo-icon {
    width:56px; height:56px; background:var(--amber);
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue'; font-size:26px; color:var(--navy);
    clip-path: polygon(10% 0%,90% 0%,100% 10%,100% 90%,90% 100%,10% 100%,0% 90%,0% 10%);
    margin-bottom:12px;
  }
  .login-titulo {
    font-family:'Bebas Neue'; font-size:28px; letter-spacing:3px; color:var(--white);
  }
  .login-sub {
    font-size:12px; color:var(--steel); letter-spacing:1px; text-transform:uppercase;
    margin-top:4px;
  }
  .login-divider {
    height:1px; background:var(--border); margin:1.5rem 0;
  }
  .btn-login {
    width:100%; justify-content:center; padding:14px;
    font-size:15px; margin-top:0.5rem;
  }
  .login-erro {
    background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3);
    color:#f87171; padding:10px 14px; border-radius:6px;
    font-size:13px; margin-top:1rem; display:none;
  }
  .login-versao {
    text-align:center; margin-top:2rem;
    font-size:11px; color:var(--steel2); letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <div class="login-logo-icon">DS</div>
    <div class="login-titulo">Danmo SS</div>
    <div class="login-sub">Cotações &amp; Faturas</div>
  </div>

  <div class="login-divider"></div>

  <div class="form-row">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="o.seu.email@danmo.com" autofocus>
  </div>
  <div class="form-row">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••"
           onkeydown="if(event.key==='Enter') entrar()">
  </div>

  <button class="btn btn-primary btn-login" onclick="entrar()">
    Entrar
  </button>

  <div class="login-erro" id="login-erro">
    Email ou senha incorrectos.
  </div>

  <div class="login-versao">Porto da Beira &mdash; Danmo Service System, Lda</div>
</div>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script>
  // Se já está autenticado, redireciona
  if (auth.getUser()) window.location.href = 'dashboard.html';

  async function entrar() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const erroEl = document.getElementById('login-erro');
    erroEl.style.display = 'none';

    if (!email || !senha) {
      erroEl.textContent = 'Por favor preencha o email e a senha.';
      erroEl.style.display = 'block';
      return;
    }

    try {
      const resultado = await db.get('utilizadores', { email, senha });
      const user = resultado[0];

      if (!user || !user.ativo) {
        erroEl.textContent = 'Email ou senha incorrectos.';
        erroEl.style.display = 'block';
        return;
      }

      auth.login(user);
      window.location.href = 'dashboard.html';

    } catch (err) {
      erroEl.textContent = 'Erro de ligação. Tente novamente.';
      erroEl.style.display = 'block';
      console.error(err);
    }
  }
</script>
</body>
</html>
