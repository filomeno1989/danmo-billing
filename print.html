<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danmo SS — Documento</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── ECRÃ ── */
body {
  font-family: 'Source Sans 3', sans-serif;
  background: #1a1a2e;
  margin: 0; padding: 20px;
  min-height: 100vh;
}
.preview-bar {
  max-width: 860px; margin: 0 auto 16px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap;
}
.preview-bar-left { display:flex; align-items:center; gap:10px; }
.btn-print {
  background: #f59e0b; color: #0a1628; border: none;
  padding: 10px 24px; border-radius: 6px; cursor: pointer;
  font-family: 'Source Sans 3'; font-size: 14px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; transition: background 0.2s;
}
.btn-print:hover { background: #d97706; }
.btn-back {
  background: transparent; color: #94a3b8;
  border: 1px solid rgba(148,163,184,0.3);
  padding: 10px 20px; border-radius: 6px; cursor: pointer;
  font-family: 'Source Sans 3'; font-size: 13px;
  text-decoration: none; display: inline-block; transition: all 0.2s;
}
.btn-back:hover { color: #f59e0b; border-color: #f59e0b; }
.preview-title {
  font-family: 'Source Sans 3'; font-size: 16px;
  font-weight: 700; color: #f59e0b; letter-spacing: 1px;
}

/* ── PAPEL ── */
.doc-wrap {
  max-width: 860px; margin: 0 auto;
  background: white; border-radius: 4px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

/* Tudo dentro do papel usa Times New Roman */
.doc-page {
  font-family: 'Times New Roman', Times, serif;
  font-size: 12pt;
  color: #000;
  padding: 18mm 18mm 14mm 18mm;
  min-height: 277mm;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ── CABEÇALHO COM LOGOS ── */
.doc-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6mm;
}
.logo-danmo   { height: 52px; width: auto; object-fit: contain; }
.logo-mmm     { height: 52px; width: auto; object-fit: contain; }

/* ── BLOCO EMPRESA / Nº / DATA ── */
.empresa-block {
  border-bottom: 1.5px solid #000;
  margin-bottom: 5mm;
  padding-bottom: 3mm;
}
.empresa-grid {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 0 20px;
  align-items: end;
}
.empresa-col-label { font-weight: bold; font-size: 11pt; text-decoration: underline; }
.empresa-col-val   { font-size: 11pt; }
.empresa-info      { font-size: 11pt; line-height: 1.6; margin-top: 2mm; }

/* ── CLIENTE / ENVIADO A ── */
.cliente-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 20px;
  margin-bottom: 5mm;
  border-bottom: 1px solid #ccc;
  padding-bottom: 3mm;
}
.bloco-label { font-weight: bold; text-decoration: underline; font-size: 11pt; margin-bottom: 2px; }
.bloco-val   { font-size: 11pt; line-height: 1.6; }

/* ── ASSUNTO ── */
.assunto-block {
  margin-bottom: 5mm;
}
.assunto-label { font-weight: bold; font-size: 11pt; margin-bottom: 2px; }
.assunto-box {
  border: 1px solid #ccc;
  padding: 8px 10px;
  font-size: 11pt;
  line-height: 1.6;
  min-height: 28mm;
}

/* ── TABELA DE ITENS ── */
.items-table {
  width: 100%; border-collapse: collapse;
  font-size: 11pt; margin-bottom: 0;
}
.items-table th {
  background: #c0c0c0;
  border: 1px solid #666;
  padding: 5px 8px;
  font-weight: bold;
  text-align: center;
  font-size: 11pt;
}
.items-table td {
  border: 1px solid #ccc;
  padding: 5px 8px;
  vertical-align: middle;
}
.items-table td.center { text-align: center; }
.items-table td.right  { text-align: right; }

/* ── BLOCO TOTAIS + EXTENSO ── */
.totais-extenso-block {
  border: 1px solid #ccc;
  border-top: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 8px;
  font-size: 11pt;
}
.extenso-txt { font-style: normal; }
.total-txt   { font-weight: bold; }
.total-val   { font-weight: bold; }

/* Linha de nota */
.nota-block {
  font-size: 11pt;
  margin-top: 3mm;
  padding: 3px 8px;
}

/* Frase final */
.frase-final {
  font-size: 11pt;
  font-style: italic;
  margin-top: 5mm;
  margin-bottom: 5mm;
}

/* ── ASSINATURA ── */
.assinatura-wrap {
  display: flex;
  justify-content: center;
  margin-top: 8mm;
  margin-bottom: 5mm;
}
.assinatura-block {
  text-align: center;
  width: 260px;
}
.assinatura-data  { font-size: 11pt; margin-bottom: 10mm; }
.assinatura-linha { border-top: 1px solid #000; padding-top: 5px; }
.assinatura-nome  { font-size: 11pt; font-weight: bold; }
.assinatura-cargo { font-size: 11pt; font-style: italic; }

/* ── RODAPÉ COM LOGOS E CÓDIGO ── */
.doc-footer {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-top: 5mm;
  border-top: 1px solid #ccc;
}
.footer-codigo {
  font-size: 7.5pt;
  color: #000;
  line-height: 1.5;
  max-width: 300px;
}
.footer-codigo b { font-size: 8pt; }
.logo-mesquita { height: 38px; width: auto; object-fit: contain; }

/* ── DESCONTO ── */
.desconto-linha {
  color: #c00;
}

/* ── IMPRESSÃO ── */
@media print {
  body { background: white; padding: 0; }
  .preview-bar { display: none !important; }
  .doc-wrap { box-shadow: none; border-radius: 0; max-width: 100%; }
  .doc-page { padding: 18mm 18mm 14mm 18mm; }
  @page { margin: 0; size: A4; }
}
</style>
</head>
<body>

<div class="preview-bar">
  <div class="preview-bar-left">
    <a href="dashboard.html" class="btn-back">← Voltar</a>
    <span class="preview-title" id="preview-title">A carregar...</span>
  </div>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
</div>

<div class="doc-wrap">
  <div class="doc-page" id="doc-page">
    <div style="text-align:center;padding:3rem;color:#999;font-family:sans-serif;">
      A carregar documento...
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script src="logos.js"></script>
<script>
auth.require();

async function carregarERender() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { mostrarErro('Nenhum documento especificado.'); return; }

  try {
    const [docs, itens, tecnicos] = await Promise.all([
      db.get('documentos', { id }),
      db.get('documento_itens', { documento_id: id }),
      db.get('tecnicos')
    ]);

    const doc = docs[0];
    if (!doc) { mostrarErro('Documento não encontrado.'); return; }

    const itensSorted = itens.sort((a,b) => a.ordem - b.ordem);
    const tipoLabel   = doc.tipo === 'fatura' ? 'Fatura' : 'Cotação';
    const taxa        = doc.taxa_cambio || 64;
    const totalMZN    = doc.moeda === 'USD' ? doc.total * taxa : doc.total;
    const totalUSD    = doc.total / taxa;

    // Preview bar
    document.getElementById('preview-title').textContent =
      `${tipoLabel} Nº ${doc.numero} — ${doc.cliente_nome || ''}`;
    document.title = `Danmo SS — ${tipoLabel} ${doc.numero}`;

    // ── CABEÇALHO ITENS TABLE ──
    let thHtml = '';
    const isMao = doc.servico === 'mao';
    const isMat = doc.servico === 'material';

    if (isMao) {
      thHtml = `<tr>
        <th style="width:40px;">Item</th>
        <th>Quantidade Técnicos</th>
        <th style="width:80px;">Tempo</th>
        <th style="width:140px;">Valor Unit.</th>
        <th style="width:150px;">Valor Total</th>
      </tr>`;
    } else if (isMat) {
      thHtml = `<tr>
        <th style="width:40px;">Item</th>
        <th>Descrição</th>
        <th style="width:55px;">Qtd</th>
        <th style="width:80px;">Unidade</th>
        <th style="width:140px;">Valor Unit.</th>
        <th style="width:150px;">Valor Total</th>
      </tr>`;
    } else {
      thHtml = `<tr>
        <th style="width:40px;">Item</th>
        <th style="width:70px;">Tipo</th>
        <th>Descrição / Técnico</th>
        <th style="width:55px;">Qtd</th>
        <th style="width:80px;">Tempo/Und</th>
        <th style="width:140px;">Valor Unit.</th>
        <th style="width:150px;">Valor Total</th>
      </tr>`;
    }

    // ── LINHAS ITENS ──
    // Linhas vazias para completar até 5 linhas (como no original)
    const MIN_LINHAS = 5;
    let linhasHtml = '';
    itensSorted.forEach((it, idx) => {
      const tec  = tecnicos.find(t => t.id === it.tecnico_id);
      const nome = tec ? tec.nome : (it.tecnico_nome || '');
      const moeda = doc.moeda;

      if (isMao) {
        linhasHtml += `<tr>
          <td class="center">${idx+1}</td>
          <td>${it.qtd} ${nome}</td>
          <td class="center">${it.tempo} ${it.unidade}</td>
          <td class="right">${fmtNum(it.valor_unit)} ${moeda}</td>
          <td class="right">${fmtNum(it.total)} ${moeda}</td>
        </tr>`;
      } else if (isMat) {
        linhasHtml += `<tr>
          <td class="center">${idx+1}</td>
          <td>${it.descricao||''}</td>
          <td class="center">${it.qtd}</td>
          <td class="center">${it.unidade}</td>
          <td class="right">${fmtNum(it.valor_unit)} ${moeda}</td>
          <td class="right">${fmtNum(it.total)} ${moeda}</td>
        </tr>`;
      } else {
        const tipoIt = it.item_tipo === 'mao' ? 'Mão-de-Obra' : 'Material';
        const desc   = it.item_tipo === 'mao'
          ? `${it.qtd} ${nome}`
          : it.descricao||'';
        const tempo  = it.item_tipo === 'mao'
          ? `${it.tempo} ${it.unidade}`
          : it.unidade;
        linhasHtml += `<tr>
          <td class="center">${idx+1}</td>
          <td class="center">${tipoIt}</td>
          <td>${desc}</td>
          <td class="center">${it.qtd}</td>
          <td class="center">${tempo}</td>
          <td class="right">${fmtNum(it.valor_unit)} ${moeda}</td>
          <td class="right">${fmtNum(it.total)} ${moeda}</td>
        </tr>`;
      }
    });

    // Linhas vazias
    const numCols = isMao ? 5 : (isMat ? 6 : 7);
    const vazias  = Math.max(0, MIN_LINHAS - itensSorted.length);
    for (let i = 0; i < vazias; i++) {
      linhasHtml += `<tr>${'<td style="height:22px;"></td>'.repeat(numCols)}</tr>`;
    }

    // ── TOTAIS ──
    const moeda    = doc.moeda;
    const desconto = doc.desconto || 0;

    // Linha de desconto (se existir)
    let descontoHtml = '';
    if (desconto > 0) {
      descontoHtml = `
        <tr class="desconto-linha">
          ${' <td></td>'.repeat(numCols - 2)}
          <td class="right"><b>Desconto</b></td>
          <td class="right">- ${fmtNum(desconto)} ${moeda}</td>
        </tr>`;
    }

    // Linha de IVA (se incluído)
    let ivaHtml = '';
    if (doc.iva_incluido) {
      ivaHtml = `<tr>
        ${'<td></td>'.repeat(numCols - 2)}
        <td class="right"><b>IVA (${doc.iva_pct||16}%)</b></td>
        <td class="right">${fmtNum(doc.iva_amt||0)} ${moeda}</td>
      </tr>`;
    }

    // Equivalência USD só aparece se moeda for USD
    let equivHtml = '';
    if (moeda === 'USD') {
      equivHtml = `<div style="font-size:10pt;color:#555;margin-top:2mm;text-align:right;">
        Equivalente: ${fmtNum(totalMZN)} MZN (taxa: 1 USD = ${taxa} MZN)
      </div>`;
    }

    // Data por extenso
    const dataExtensa = dataExtenso(doc.data);

    // ── HTML DO DOCUMENTO ──
    document.getElementById('doc-page').innerHTML = `

      <!-- TOPO: logos -->
      <div class="doc-header">
        <img src="${LOGO_DANMO}" class="logo-danmo" alt="Danmo">
        <img src="${LOGO_MMM}"   class="logo-mmm"   alt="Made in Mozambique">
      </div>

      <!-- EMPRESA / Nº / DATA -->
      <div class="empresa-block">
        <div class="empresa-grid">
          <span class="empresa-col-label">Empresa</span>
          <span class="empresa-col-label">${tipoLabel}</span>
          <span class="empresa-col-label">DATA</span>

          <span class="empresa-col-val">Danmo Service System, Lda</span>
          <span class="empresa-col-val">${doc.numero}</span>
          <span class="empresa-col-val">${fmtData(doc.data)}</span>
        </div>
        <div class="empresa-info">
          Porto da Beira<br>
          Nuit: 400024022<br>
          843 019 615
        </div>
      </div>

      <!-- CLIENTE / ENVIADO A -->
      <div class="cliente-block">
        <div>
          <div class="bloco-label">Cliente</div>
          <div class="bloco-val">
            ${doc.cliente_nome||''}<br>
            ${doc.cliente_morada ? doc.cliente_morada + '<br>' : ''}
            ${doc.cliente_nuit ? 'Nuit: ' + doc.cliente_nuit + '<br>' : ''}
            ${doc.cliente_contacto || ''}
          </div>
        </div>
        <div>
          <div class="bloco-label">Enviado A</div>
          <div class="bloco-val">
            ${doc.enviado_nome || ''}
            ${doc.enviado_cargo ? '<br>' + doc.enviado_cargo : ''}
          </div>
        </div>
      </div>

      <!-- ASSUNTO -->
      <div class="assunto-block">
        <div class="assunto-label">Assunto:</div>
        <div class="assunto-box">${(doc.assunto||'').replace(/\n/g,'<br>')}</div>
      </div>

      <!-- TABELA DE ITENS -->
      <table class="items-table">
        <thead>${thHtml}</thead>
        <tbody>
          ${linhasHtml}
          ${descontoHtml}
          ${ivaHtml}
        </tbody>
      </table>

      <!-- EXTENSO + TOTAL -->
      <div class="totais-extenso-block">
        <span class="extenso-txt">São: ${numPorExtenso(totalMZN)}</span>
        <span class="total-txt">TOTAL ${moeda} &nbsp;&nbsp;</span>
        <span class="total-val">${fmtNum(doc.total)} ${moeda}</span>
      </div>

      ${equivHtml}

      <!-- NOTA IVA -->
      <div class="nota-block">
        ${doc.iva_incluido
          ? `IVA de ${doc.iva_pct||16}% incluído.`
          : 'Nota: IVA não incluído'
        }
      </div>

      <!-- FRASE FINAL -->
      <div class="frase-final">
        Sem outro assunto de momento subscreve-se com elevada estima e consideração.
      </div>

      <!-- ASSINATURA -->
      <div class="assinatura-wrap">
        <div class="assinatura-block">
          <div class="assinatura-data">${dataExtensa}</div>
          <div class="assinatura-linha">
            <div class="assinatura-nome">${doc.utilizador_nome||'________________________________'}</div>
            <div class="assinatura-cargo">${doc.utilizador_cargo ? '(' + doc.utilizador_cargo + ')' : ''}</div>
          </div>
        </div>
      </div>

      <!-- RODAPÉ -->
      <div class="doc-footer">
        <div class="footer-codigo">
          <b>Código</b> DAN_ADO_FR_030_REV02_29.05.26<br>
          Este documento é propriedade da DANMO. Não é permitida sua reprodução sem autorização.<br>
          Depois de impresso este documento é considerado cópia não controlado
        </div>
        <img src="${LOGO_MESQUITA}" class="logo-mesquita" alt="Grupo Mesquita">
      </div>
    `;

  } catch(err) {
    console.error(err);
    mostrarErro('Erro ao carregar o documento.');
  }
}

function mostrarErro(msg) {
  document.getElementById('doc-page').innerHTML =
    `<div style="text-align:center;padding:3rem;color:#c00;font-family:sans-serif;">${msg}</div>`;
}

// Data por extenso: "Beira, 17 de outubro de 2025"
function dataExtenso(dataStr) {
  if (!dataStr) return '';
  const meses = ['janeiro','fevereiro','março','abril','maio','junho',
                 'julho','agosto','setembro','outubro','novembro','dezembro'];
  const d = new Date(dataStr + 'T12:00:00');
  return `Beira, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

carregarERender();
</script>
</body>
</html>
