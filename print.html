<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danmo SS — Documento</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── ECRÃ (preview antes de imprimir) ── */
body {
  font-family: 'Source Sans 3', sans-serif;
  background: #1a1a2e;
  margin: 0; padding: 20px;
  min-height: 100vh;
}
.preview-bar {
  max-width: 820px; margin: 0 auto 16px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap;
}
.preview-bar-left { display:flex; align-items:center; gap:10px; }
.btn-print {
  background: #f59e0b; color: #0a1628; border: none;
  padding: 10px 24px; border-radius: 6px; cursor: pointer;
  font-family: 'Source Sans 3'; font-size: 14px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  transition: background 0.2s;
}
.btn-print:hover { background: #d97706; }
.btn-back {
  background: transparent; color: #94a3b8;
  border: 1px solid rgba(148,163,184,0.3);
  padding: 10px 20px; border-radius: 6px; cursor: pointer;
  font-family: 'Source Sans 3'; font-size: 13px;
  text-decoration: none; display: inline-block;
  transition: all 0.2s;
}
.btn-back:hover { color: #f59e0b; border-color: #f59e0b; }
.preview-title {
  font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 2px; color: #f59e0b;
}
.loading-msg { color: #94a3b8; font-size: 14px; }

/* ── DOCUMENTO (papel) ── */
.doc-wrap {
  max-width: 820px; margin: 0 auto;
  background: white; border-radius: 4px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  overflow: hidden;
}
.doc-inner { padding: 32px 40px; color: #1a1a1a; }

/* Cabeçalho */
.doc-header {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 24px;
  padding-bottom: 20px; border-bottom: 3px solid #0a1628;
}
.company-name {
  font-family: 'Bebas Neue'; font-size: 30px;
  color: #0a1628; letter-spacing: 2px; line-height: 1;
}
.company-sub { font-size: 11px; color: #666; margin-top: 4px; line-height: 1.6; }
.doc-type-block { text-align: right; }
.doc-type-label {
  font-family: 'Bebas Neue'; font-size: 22px;
  color: #f59e0b; letter-spacing: 3px;
}
.doc-number { font-size: 26px; font-weight: 700; color: #0a1628; line-height: 1; }
.doc-date   { font-size: 12px; color: #666; margin-top: 4px; }

/* Partes */
.doc-parties {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 24px; margin-bottom: 20px;
}
.party-block {}
.party-label {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: #999; margin-bottom: 6px;
}
.party-name { font-size: 15px; font-weight: 700; color: #0a1628; margin-bottom: 4px; }
.party-detail { font-size: 12px; color: #444; line-height: 1.7; }

/* Tipo cliente badge */
.tipo-cli-badge {
  display: inline-block; font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; padding: 2px 8px; border-radius: 3px;
  margin-bottom: 8px; font-weight: 600;
}
.tc-interno { background: #dbeafe; color: #1e40af; }
.tc-externo { background: #dcfce7; color: #166534; }
.tc-outro   { background: #f3f4f6; color: #374151; }

/* Assunto */
.doc-assunto {
  background: #f8f9fa; border-left: 4px solid #f59e0b;
  padding: 12px 16px; margin-bottom: 20px;
  font-size: 13px; color: #333; line-height: 1.6;
  border-radius: 0 4px 4px 0;
}
.doc-assunto strong { color: #0a1628; }

/* Tabela de itens */
.items-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
.items-table th {
  background: #0a1628; color: white; padding: 9px 10px;
  text-align: left; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
}
.items-table th.right { text-align: right; }
.items-table td { padding: 9px 10px; border-bottom: 1px solid #eee; }
.items-table td.right { text-align: right; font-family: 'Courier Prime'; }
.items-table td.bold  { font-weight: 700; }
.items-table tr:nth-child(even) td { background: #f9fafb; }
.items-table tr:last-child td { border-bottom: 2px solid #e5e7eb; }

/* Totais */
.doc-bottom {
  display: flex; justify-content: flex-end; margin-bottom: 16px;
}
.totais-block { width: 320px; }
.total-linha {
  display: flex; justify-content: space-between;
  padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f0f0f0;
}
.total-linha .label { color: #666; }
.total-linha .valor { font-family: 'Courier Prime'; font-weight: 700; }
.total-linha.final {
  font-size: 17px; font-weight: 700; color: #0a1628;
  border-bottom: 2px solid #0a1628; border-top: 2px solid #0a1628;
  padding: 8px 0; margin-top: 4px;
}
.total-linha.final .valor { font-size: 18px; }
.equiv-linha {
  font-size: 11px; color: #999; text-align: right;
  margin-top: 4px; font-style: italic;
}

/* Extenso */
.extenso-block {
  font-size: 12px; font-style: italic; color: #555;
  padding: 10px 14px; background: #f8f9fa;
  border: 1px solid #e5e7eb; border-radius: 4px;
  margin-bottom: 24px; line-height: 1.5;
}

/* Rodapé */
.doc-footer {
  display: flex; justify-content: space-between;
  align-items: flex-end; padding-top: 20px;
  border-top: 1px solid #e5e7eb; margin-top: 8px;
}
.footer-nota { font-size: 11px; color: #888; max-width: 320px; line-height: 1.6; }
.assinatura-block { text-align: center; }
.assinatura-linha {
  border-top: 1px solid #999; width: 240px;
  padding-top: 8px; margin-top: 50px;
}
.assinatura-nome  { font-weight: 700; font-size: 13px; color: #0a1628; }
.assinatura-cargo { font-size: 11px; color: #666; margin-top: 2px; }
.assinatura-data  { font-size: 11px; color: #999; margin-top: 2px; }

/* Marca de água tipo de cliente */
.doc-tipo-cli-bar {
  height: 4px; width: 100%;
}
.bar-interno { background: linear-gradient(90deg, #1e40af, #3b82f6); }
.bar-externo { background: linear-gradient(90deg, #166534, #22c55e); }
.bar-outro   { background: linear-gradient(90deg, #374151, #9ca3af); }

/* ── IMPRESSÃO ── */
@media print {
  body { background: white; padding: 0; }
  .preview-bar { display: none !important; }
  .doc-wrap { box-shadow: none; border-radius: 0; max-width: 100%; }
  .doc-inner { padding: 20mm 20mm 15mm; }
  @page { margin: 0; size: A4; }
}
</style>
</head>
<body>

<!-- BARRA DE PREVIEW (só no ecrã) -->
<div class="preview-bar">
  <div class="preview-bar-left">
    <a href="dashboard.html" class="btn-back">← Voltar</a>
    <span class="preview-title" id="preview-title">A carregar...</span>
  </div>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
</div>

<!-- DOCUMENTO -->
<div class="doc-wrap" id="doc-wrap">
  <div class="doc-inner">
    <div class="loading-msg" style="text-align:center;padding:3rem;color:#999;">
      A carregar documento...
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script>
auth.require();

async function carregarERendar() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) {
    document.getElementById('doc-wrap').innerHTML =
      '<div class="doc-inner" style="text-align:center;padding:3rem;color:#999;">Nenhum documento especificado.</div>';
    return;
  }

  try {
    const [docs, itens, tecnicos] = await Promise.all([
      db.get('documentos', { id }),
      db.get('documento_itens', { documento_id: id }),
      db.get('tecnicos')
    ]);

    const doc = docs[0];
    if (!doc) {
      document.getElementById('doc-wrap').innerHTML =
        '<div class="doc-inner" style="text-align:center;padding:3rem;color:#999;">Documento não encontrado.</div>';
      return;
    }

    const itensSorted = itens.sort((a,b) => a.ordem - b.ordem);
    const tipoLabel   = doc.tipo === 'fatura' ? 'FATURA' : 'COTAÇÃO';
    const taxa        = doc.taxa_cambio || 64;
    const totalMZN    = doc.moeda === 'USD' ? doc.total * taxa : doc.total;
    const totalUSD    = doc.moeda === 'USD' ? doc.total : doc.total / taxa;

    // Barra de preview
    document.getElementById('preview-title').textContent =
      `${tipoLabel} Nº ${doc.numero} — ${doc.cliente_nome || ''}`;
    document.title = `Danmo SS — ${tipoLabel} ${doc.numero}`;

    // Cabeçalho da tabela de itens
    let thItens = '';
    const isMao  = doc.servico === 'mao';
    const isMat  = doc.servico === 'material';
    const isMix  = doc.servico === 'misto';

    if (isMao) {
      thItens = `<tr><th>#</th><th>Técnico</th><th>Qtd</th><th>Tempo</th><th>Unidade</th>
                 <th class="right">Val. Unit. (${doc.moeda})</th>
                 <th class="right">Total (${doc.moeda})</th></tr>`;
    } else if (isMat) {
      thItens = `<tr><th>#</th><th>Descrição</th><th>Qtd</th><th>Unidade</th>
                 <th class="right">Val. Unit. (${doc.moeda})</th>
                 <th class="right">Total (${doc.moeda})</th></tr>`;
    } else {
      thItens = `<tr><th>#</th><th>Tipo</th><th>Descrição / Técnico</th>
                 <th>Qtd</th><th>Tempo/Und</th>
                 <th class="right">Val. Unit. (${doc.moeda})</th>
                 <th class="right">Total (${doc.moeda})</th></tr>`;
    }

    // Linhas de itens
    const linhasItens = itensSorted.map((it, idx) => {
      const tec  = tecnicos.find(t => t.id === it.tecnico_id);
      const nome = tec ? tec.nome : (it.tecnico_nome || '—');

      if (isMao) {
        return `<tr>
          <td>${idx+1}</td><td>${nome}</td>
          <td>${it.qtd}</td><td>${it.tempo}</td><td>${it.unidade}</td>
          <td class="right">${fmtNum(it.valor_unit)}</td>
          <td class="right bold">${fmtNum(it.total)}</td>
        </tr>`;
      } else if (isMat) {
        return `<tr>
          <td>${idx+1}</td><td>${it.descricao||'—'}</td>
          <td>${it.qtd}</td><td>${it.unidade}</td>
          <td class="right">${fmtNum(it.valor_unit)}</td>
          <td class="right bold">${fmtNum(it.total)}</td>
        </tr>`;
      } else {
        const tipoIt = it.item_tipo === 'mao' ? 'Mão-de-Obra' : 'Material';
        const desc   = it.item_tipo === 'mao' ? nome : (it.descricao||'—');
        const tempo  = it.item_tipo === 'mao' ? `${it.tempo} ${it.unidade}` : it.unidade;
        return `<tr>
          <td>${idx+1}</td><td>${tipoIt}</td><td>${desc}</td>
          <td>${it.qtd}</td><td>${tempo}</td>
          <td class="right">${fmtNum(it.valor_unit)}</td>
          <td class="right bold">${fmtNum(it.total)}</td>
        </tr>`;
      }
    }).join('');

    // Totais
    let totaisHtml = `
      <div class="total-linha">
        <span class="label">Subtotal</span>
        <span class="valor">${fmtNum(doc.subtotal)} ${doc.moeda}</span>
      </div>`;
    if (doc.iva_incluido) {
      totaisHtml += `
      <div class="total-linha">
        <span class="label">IVA (${doc.iva_pct||16}%)</span>
        <span class="valor">${fmtNum(doc.iva_amt||0)} ${doc.moeda}</span>
      </div>`;
    }
    totaisHtml += `
      <div class="total-linha final">
        <span class="label">TOTAL ${doc.moeda}</span>
        <span class="valor">${fmtNum(doc.total)} ${doc.moeda}</span>
      </div>`;

    const equivHtml = doc.moeda === 'USD'
      ? `<div class="equiv-linha">≈ ${fmtNum(totalMZN)} MZN (taxa: ${taxa})</div>`
      : `<div class="equiv-linha">≈ USD ${fmtNum(totalUSD)} (taxa: ${taxa})</div>`;

    // Tipo cliente
    const tcMap   = { interno:'tc-interno', externo:'tc-externo', outro:'tc-outro' };
    const tcLabel = { interno:'Cliente Interno', externo:'Cliente Externo', outro:'Outro' };
    const barMap  = { interno:'bar-interno', externo:'bar-externo', outro:'bar-outro' };
    const tc      = doc.tipo_cliente || 'interno';

    // HTML final do documento
    document.getElementById('doc-wrap').innerHTML = `
      <div class="doc-tipo-cli-bar ${barMap[tc]}"></div>
      <div class="doc-inner">

        <!-- Cabeçalho -->
        <div class="doc-header">
          <div>
            <div class="company-name">Danmo Service System, Lda</div>
            <div class="company-sub">
              Porto da Beira, Sofala — Moçambique<br>
              NUIT: 400024022 &nbsp;|&nbsp; Tel: +258 84 301 9615
            </div>
          </div>
          <div class="doc-type-block">
            <div class="doc-type-label">${tipoLabel}</div>
            <div class="doc-number">Nº ${doc.numero}</div>
            <div class="doc-date">${fmtData(doc.data)}</div>
          </div>
        </div>

        <!-- Partes -->
        <div class="doc-parties">
          <div class="party-block">
            <div class="party-label">De</div>
            <div class="party-name">Danmo Service System, Lda</div>
            <div class="party-detail">
              Porto da Beira, Sofala — Moçambique<br>
              NUIT: 400024022<br>
              Tel: +258 84 301 9615
            </div>
          </div>
          <div class="party-block">
            <div class="party-label">Para</div>
            <span class="tipo-cli-badge ${tcMap[tc]}">${tcLabel[tc]}</span>
            <div class="party-name">${doc.cliente_nome||'—'}</div>
            <div class="party-detail">
              ${doc.cliente_morada ? doc.cliente_morada + '<br>' : ''}
              ${doc.cliente_nuit ? 'NUIT: ' + doc.cliente_nuit + '<br>' : ''}
              ${doc.cliente_contacto ? 'Tel: ' + doc.cliente_contacto + '<br>' : ''}
              ${doc.enviado_nome ? '<br>Att: <strong>' + doc.enviado_nome + '</strong>' + (doc.enviado_cargo ? ' — ' + doc.enviado_cargo : '') : ''}
            </div>
          </div>
        </div>

        <!-- Assunto -->
        ${doc.assunto ? `
        <div class="doc-assunto">
          <strong>Assunto:</strong><br>${doc.assunto}
        </div>` : ''}

        <!-- Tabela de itens -->
        <table class="items-table">
          <thead>${thItens}</thead>
          <tbody>${linhasItens}</tbody>
        </table>

        <!-- Totais -->
        <div class="doc-bottom">
          <div class="totais-block">
            ${totaisHtml}
            ${equivHtml}
          </div>
        </div>

        <!-- Extenso -->
        <div class="extenso-block">
          ${numPorExtenso(totalMZN)}
        </div>

        <!-- Rodapé -->
        <div class="doc-footer">
          <div class="footer-nota">
            ${doc.iva_incluido
              ? `IVA de ${doc.iva_pct||16}% incluído no valor total.`
              : 'IVA não incluído no valor apresentado.'
            }
          </div>
          <div class="assinatura-block">
            <div class="assinatura-linha">
              <div class="assinatura-nome">${doc.utilizador_nome||'________________________________'}</div>
              <div class="assinatura-cargo">${doc.utilizador_cargo||''}</div>
              <div class="assinatura-data">Beira, ${fmtData(doc.data)}</div>
            </div>
          </div>
        </div>

      </div><!-- /doc-inner -->
    `;

  } catch(err) {
    console.error(err);
    document.getElementById('doc-wrap').innerHTML =
      '<div class="doc-inner" style="text-align:center;padding:3rem;color:#c00;">Erro ao carregar o documento.</div>';
  }
}

carregarERendar();
</script>
</body>
</html>
