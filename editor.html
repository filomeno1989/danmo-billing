<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danmo SS — Editor</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Itens da tabela */
  .items-table { width:100%; border-collapse:collapse; font-size:13px; }
  .items-table th {
    background:rgba(245,158,11,0.1); padding:8px 10px;
    font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--amber); text-align:left;
    border-bottom:1px solid rgba(245,158,11,0.2);
  }
  .items-table td { padding:5px 4px; vertical-align:middle; }
  .items-table input,
  .items-table select { padding:7px 8px; font-size:13px; }
  .item-del {
    background:transparent; border:none; color:var(--steel2);
    cursor:pointer; padding:4px 10px; font-size:18px;
    transition:color 0.2s; line-height:1;
  }
  .item-del:hover { color:var(--danger); }
  .item-total {
    font-family:'Courier Prime'; color:var(--amber);
    font-weight:700; font-size:14px; white-space:nowrap;
    padding:0 8px;
  }

  /* Caixa de totais */
  .totais-box {
    background:rgba(245,158,11,0.06);
    border:1px solid rgba(245,158,11,0.2);
    border-radius:8px; padding:1.5rem;
  }
  .total-linha {
    display:flex; justify-content:space-between;
    padding:7px 0; font-size:14px;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .total-linha:last-child { border-bottom:none; }
  .total-linha.grande {
    font-family:'Bebas Neue'; font-size:24px; color:var(--amber);
    padding-top:12px; margin-top:4px;
    border-top:1px solid rgba(245,158,11,0.3);
    border-bottom:none;
  }
  .extenso-box {
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border); border-radius:6px;
    padding:12px; font-style:italic; font-size:13px;
    color:var(--steel); margin-top:10px; line-height:1.5;
  }

  /* Barra de acções fixa em baixo */
  .action-bar {
    position:sticky; bottom:0; z-index:50;
    background:var(--navy2); border-top:1px solid var(--border);
    padding:12px 2rem; display:flex;
    justify-content:space-between; align-items:center;
    box-shadow:0 -4px 20px rgba(0,0,0,0.4);
  }
  .action-bar-left { display:flex; align-items:center; gap:12px; }
  .action-bar-right { display:flex; gap:10px; }

  /* Indicador de estado */
  .estado-badge {
    font-size:12px; padding:4px 12px; border-radius:20px;
    font-weight:600; letter-spacing:1px;
  }
  .estado-novo     { background:rgba(148,163,184,0.15); color:var(--steel); }
  .estado-guardado { background:rgba(16,185,129,0.15); color:#34d399; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <a href="dashboard.html" class="logo">
    <div class="logo-icon">DS</div>
    <div>
      <div class="logo-text">Danmo SS</div>
      <div class="logo-sub">Cotações &amp; Faturas</div>
    </div>
  </a>
  <nav class="header-nav" id="main-nav"></nav>
  <div class="user-info">
    <div>
      <div class="user-name" id="user-nome"></div>
      <div class="user-nivel" id="user-nivel-badge"></div>
    </div>
    <button class="btn-logout" onclick="auth.logout()">Sair</button>
  </div>
</header>

<!-- MODAL CONFIRMAR -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal modal-sm">
    <div class="modal-title">⚠️ Confirmar</div>
    <p id="confirm-msg"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="fecharModal('modal-confirm')">Cancelar</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Confirmar</button>
    </div>
  </div>
</div>

<!-- CORPO -->
<div class="page-body" style="padding-bottom:80px;">

  <div class="grid-2" style="gap:1.5rem;align-items:start;">

    <!-- COLUNA ESQUERDA -->
    <div>

      <!-- TIPO DE DOCUMENTO -->
      <div class="card">
        <div class="card-title">📄 Documento</div>

        <div class="form-row">
          <label>Tipo</label>
          <div class="toggle-group" id="tg-tipo">
            <button class="toggle-opt active" onclick="setTipo('cotacao',this)">Cotação</button>
            <button class="toggle-opt" onclick="setTipo('fatura',this)">Fatura</button>
          </div>
        </div>

        <div class="form-row-inline">
          <div>
            <label>Número</label>
            <input type="text" id="doc-numero" placeholder="ex: 005/26">
          </div>
          <div>
            <label>Data</label>
            <input type="date" id="doc-data">
          </div>
        </div>

        <div class="form-row">
          <label>Nº Ordem Interno</label>
          <input type="text" id="doc-ordem" placeholder="ex: DM0000013">
        </div>
      </div>

      <!-- CLIENTE -->
      <div class="card">
        <div class="card-title">🏢 Cliente</div>

        <div class="form-row">
          <label>Selecionar da base de dados</label>
          <select id="sel-cliente" onchange="preencherCliente()">
            <option value="">— Selecionar cliente —</option>
          </select>
        </div>

        <div class="form-row">
          <label>Nome / Empresa *</label>
          <input type="text" id="cli-nome" placeholder="Nome da empresa">
        </div>
        <div class="form-row">
          <label>Morada</label>
          <input type="text" id="cli-morada" placeholder="Endereço">
        </div>
        <div class="form-row-inline">
          <div>
            <label>NUIT</label>
            <input type="text" id="cli-nuit">
          </div>
          <div>
            <label>Contacto</label>
            <input type="text" id="cli-contacto">
          </div>
        </div>
        <div class="form-row-inline">
          <div>
            <label>Enviado a (nome)</label>
            <input type="text" id="cli-env-nome">
          </div>
          <div>
            <label>Cargo / Dep.</label>
            <input type="text" id="cli-env-cargo">
          </div>
        </div>
      </div>

      <!-- DESCRIÇÃO -->
      <div class="card">
        <div class="card-title">📝 Descrição do Serviço</div>
        <div class="form-row">
          <label>Assunto / Descrição</label>
          <textarea id="doc-assunto" placeholder="Descreva o serviço a realizar..." style="min-height:100px;"></textarea>
        </div>
        <div class="form-row">
          <label>Nota adicional</label>
          <input type="text" id="doc-nota" value="IVA não incluído">
        </div>
      </div>

    </div><!-- /coluna esquerda -->

    <!-- COLUNA DIREITA -->
    <div>

      <!-- CONFIGURAÇÕES -->
      <div class="card">
        <div class="card-title">⚙️ Configurações</div>

        <div class="form-row">
          <label>Tipo de Serviço</label>
          <div class="toggle-group" id="tg-servico">
            <button class="toggle-opt active" onclick="setServico('mao',this)">Mão-de-Obra</button>
            <button class="toggle-opt" onclick="setServico('material',this)">Material</button>
            <button class="toggle-opt" onclick="setServico('misto',this)">Misto</button>
          </div>
        </div>

        <div class="form-row">
          <label>Moeda Principal</label>
          <div class="toggle-group" id="tg-moeda">
            <button class="toggle-opt active" onclick="setMoeda('MZN',this)">MZN</button>
            <button class="toggle-opt" onclick="setMoeda('USD',this)">USD</button>
          </div>
        </div>

        <div class="form-row" id="row-taxa" style="display:none;">
          <label>Taxa de Câmbio (1 USD = ? MZN)</label>
          <input type="number" id="taxa-cambio" value="64" step="0.5" min="1" oninput="calcTotais()">
        </div>

        <div class="form-row">
          <label>IVA</label>
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
            <div class="toggle-group" id="tg-iva">
              <button class="toggle-opt active" onclick="setIVA(false,this)">Não incluído</button>
              <button class="toggle-opt" onclick="setIVA(true,this)">Incluído</button>
            </div>
            <div id="row-iva-pct" style="display:none;display:flex;align-items:center;gap:6px;">
              <input type="number" id="iva-pct" value="16" min="0" max="100" step="0.5"
                     oninput="calcTotais()" style="width:70px;">
              <span style="color:var(--steel);font-size:14px;">%</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <label>Elaborado por</label>
          <select id="sel-utilizador">
            <option value="">— Selecionar —</option>
          </select>
        </div>
      </div>

      <!-- ITENS -->
      <div class="card">
        <div class="card-title">📦 Itens do Serviço</div>
        <div style="overflow-x:auto;">
          <table class="items-table">
            <thead id="items-thead"></thead>
            <tbody id="items-body"></tbody>
          </table>
        </div>
        <div style="margin-top:12px;">
          <button class="btn btn-outline btn-sm" onclick="adicionarItem()">➕ Adicionar linha</button>
        </div>
      </div>

      <!-- TOTAIS -->
      <div class="totais-box">
        <div class="total-linha">
          <span style="color:var(--steel);">Subtotal</span>
          <span id="val-subtotal">0,00</span>
        </div>
        <div class="total-linha" id="linha-iva" style="display:none;">
          <span style="color:var(--steel);" id="label-iva">IVA (16%)</span>
          <span id="val-iva">0,00</span>
        </div>
        <div class="total-linha grande">
          <span id="label-total">TOTAL MZN</span>
          <span id="val-total">0,00</span>
        </div>
        <div id="equiv-usd" style="display:none;font-size:12px;color:var(--steel);text-align:right;margin-top:4px;"></div>
        <div class="extenso-box" id="val-extenso">—</div>
      </div>

    </div><!-- /coluna direita -->

  </div>
</div><!-- /page-body -->

<!-- BARRA DE ACÇÕES FIXA -->
<div class="action-bar">
  <div class="action-bar-left">
    <a href="dashboard.html" class="btn btn-outline btn-sm">← Voltar</a>
    <span class="estado-badge estado-novo" id="estado-badge">Novo documento</span>
    <span id="doc-id-label" style="font-size:12px;color:var(--steel2);display:none;"></span>
  </div>
  <div class="action-bar-right">
    <button class="btn btn-outline" onclick="guardar(false)">💾 Guardar</button>
    <button class="btn btn-primary" onclick="guardarEImprimir()">🖨️ Guardar e Imprimir</button>
  </div>
</div>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script>
// ── ESTADO ────────────────────────────────────────────
const user    = auth.require();
let docId     = null;
let docTipo   = 'cotacao';
let docServ   = 'mao';
let docMoeda  = 'MZN';
let ivaOn     = false;
let itens     = [];
let clientes  = [];
let tecnicos  = [];
let utilizadores = [];
let todosDocumentos = [];

// ── INIT ──────────────────────────────────────────────
document.getElementById('user-nome').textContent = user.nome;
const nb = document.getElementById('user-nivel-badge');
nb.textContent = user.nivel.charAt(0).toUpperCase() + user.nivel.slice(1);
nb.className = `user-nivel nivel-${user.nivel}`;

// Verificar permissão
if (!auth.pode.criarDocumento()) {
  window.location.href = 'dashboard.html';
}

buildNav();
iniciar();

async function iniciar() {
  // Carregar dados
  [clientes, tecnicos, utilizadores, todosDocumentos] = await Promise.all([
    db.get('clientes'),
    db.get('tecnicos'),
    db.get('utilizadores'),
    db.get('documentos')
  ]);

  // Popular selects
  popularClientesSelect();
  popularUtilizadoresSelect();

  // Data de hoje por defeito
  document.getElementById('doc-data').value = hoje();

  // Verificar se é edição (?id=xxx na URL)
  const params = new URLSearchParams(window.location.search);
  const editId = params.get('id');
  if (editId) {
    await carregarDocumento(editId);
  } else {
    // Novo documento — auto-número
    document.getElementById('doc-numero').value = proximoNumero('cotacao', todosDocumentos);
    // Pré-selecionar utilizador actual
    document.getElementById('sel-utilizador').value = user.id;
    // Construir tabela de itens
    construirTabelaItens();
    adicionarItem();
  }
}

// ── NAV ───────────────────────────────────────────────
function buildNav() {
  const menus = {
    admin:  [
      { label:'📋 Dashboard',    href:'dashboard.html' },
      { label:'➕ Novo',         href:'editor.html' },
      { label:'🏢 Clientes',     href:'clientes.html' },
      { label:'👷 Técnicos',     href:'tecnicos.html' },
      { label:'👤 Utilizadores', href:'utilizadores.html' },
    ],
    gestor: [
      { label:'📋 Dashboard', href:'dashboard.html' },
      { label:'➕ Novo',      href:'editor.html' },
      { label:'🏢 Clientes',  href:'clientes.html' },
    ],
    operador: [{ label:'📋 Dashboard', href:'dashboard.html' }]
  };
  const nav = document.getElementById('main-nav');
  (menus[user.nivel] || menus.operador).forEach(item => {
    const a = document.createElement('a');
    a.href = item.href;
    a.className = 'nav-btn' + (item.href === 'editor.html' ? ' active' : '');
    a.textContent = item.label;
    nav.appendChild(a);
  });
}

// ── CARREGAR DOCUMENTO (edição) ───────────────────────
async function carregarDocumento(id) {
  try {
    const [docs, itensBD] = await Promise.all([
      db.get('documentos', { id }),
      db.get('documento_itens', { documento_id: id })
    ]);
    const doc = docs[0];
    if (!doc) { alert('Documento não encontrado.'); return; }

    docId    = doc.id;
    docTipo  = doc.tipo;
    docServ  = doc.servico;
    docMoeda = doc.moeda;
    ivaOn    = doc.iva_incluido;

    // Toggles
    activarToggle('tg-tipo',   docTipo   === 'fatura'   ? 1 : 0);
    activarToggle('tg-servico',docServ   === 'material' ? 1 : docServ === 'misto' ? 2 : 0);
    activarToggle('tg-moeda',  docMoeda  === 'USD'      ? 1 : 0);
    activarToggle('tg-iva',    ivaOn                    ? 1 : 0);

    // Campos
    setVal('doc-numero',  doc.numero);
    setVal('doc-data',    doc.data);
    setVal('doc-ordem',   doc.ordem);
    setVal('cli-nome',    doc.cliente_nome);
    setVal('cli-morada',  doc.cliente_morada);
    setVal('cli-nuit',    doc.cliente_nuit);
    setVal('cli-contacto',doc.cliente_contacto);
    setVal('cli-env-nome',doc.enviado_nome);
    setVal('cli-env-cargo',doc.enviado_cargo);
    setVal('doc-assunto', doc.assunto);
    setVal('doc-nota',    doc.nota);
    setVal('taxa-cambio', doc.taxa_cambio || 64);
    setVal('iva-pct',     doc.iva_pct || 16);
    setVal('sel-utilizador', doc.utilizador_id);

    // Visibilidade
    document.getElementById('row-taxa').style.display    = docMoeda === 'USD' ? 'block' : 'none';
    document.getElementById('row-iva-pct').style.display = ivaOn ? 'flex' : 'none';
    document.getElementById('linha-iva').style.display   = ivaOn ? 'flex' : 'none';

    // Itens
    itens = itensBD.sort((a,b) => a.ordem - b.ordem).map(it => ({
      id:         it.id,
      _id:        it.id,
      item_tipo:  it.item_tipo,
      tecnico_id: it.tecnico_id,
      descricao:  it.descricao,
      qtd:        it.qtd,
      tempo:      it.tempo,
      unidade:    it.unidade,
      valor_unit: it.valor_unit,
      total:      it.total,
      _salvo:     true
    }));

    construirTabelaItens();
    renderItens();
    calcTotais();

    // Badge estado
    document.getElementById('estado-badge').textContent = 'A editar';
    document.getElementById('estado-badge').className = 'estado-badge estado-guardado';
    document.getElementById('doc-id-label').textContent = `ID: ${docId.substring(0,8)}...`;
    document.getElementById('doc-id-label').style.display = 'inline';

  } catch (err) {
    console.error(err);
    alert('Erro ao carregar documento.');
  }
}

// ── TOGGLES ───────────────────────────────────────────
function setTipo(t, btn) {
  docTipo = t;
  activarBtn(btn);
  if (!docId) {
    document.getElementById('doc-numero').value = proximoNumero(t, todosDocumentos);
  }
}

function setServico(s, btn) {
  docServ = s;
  activarBtn(btn);
  itens = [];
  construirTabelaItens();
  adicionarItem();
  calcTotais();
}

function setMoeda(m, btn) {
  docMoeda = m;
  activarBtn(btn);
  document.getElementById('row-taxa').style.display    = m === 'USD' ? 'block' : 'none';
  document.getElementById('label-total').textContent   = 'TOTAL ' + m;
  calcTotais();
}

function setIVA(on, btn) {
  ivaOn = on;
  activarBtn(btn);
  document.getElementById('row-iva-pct').style.display = on ? 'flex' : 'none';
  document.getElementById('linha-iva').style.display   = on ? 'flex' : 'none';
  calcTotais();
}

function activarBtn(btn) {
  btn.closest('.toggle-group').querySelectorAll('.toggle-opt')
     .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function activarToggle(grupoId, idx) {
  const btns = document.getElementById(grupoId)?.querySelectorAll('.toggle-opt');
  if (!btns) return;
  btns.forEach((b,i) => b.classList.toggle('active', i === idx));
}

// ── CLIENTES SELECT ───────────────────────────────────
function popularClientesSelect() {
  const sel = document.getElementById('sel-cliente');
  sel.innerHTML = '<option value="">— Selecionar cliente —</option>' +
    clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
}

function preencherCliente() {
  const id = document.getElementById('sel-cliente').value;
  const c  = clientes.find(x => x.id === id);
  if (!c) return;
  setVal('cli-nome',     c.nome);
  setVal('cli-morada',   c.morada || '');
  setVal('cli-nuit',     c.nuit   || '');
  setVal('cli-contacto', c.contacto || '');
}

// ── UTILIZADORES SELECT ───────────────────────────────
function popularUtilizadoresSelect() {
  const sel = document.getElementById('sel-utilizador');
  sel.innerHTML = '<option value="">— Selecionar —</option>' +
    utilizadores.map(u =>
      `<option value="${u.id}">${u.nome} — ${u.cargo||''}</option>`
    ).join('');
  sel.value = user.id;
}

// ── TABELA DE ITENS ───────────────────────────────────
function construirTabelaItens() {
  const thead = document.getElementById('items-thead');
  if (docServ === 'mao') {
    thead.innerHTML = `<tr>
      <th>#</th><th style="min-width:160px;">Técnico</th>
      <th style="width:55px;">Qtd</th><th style="width:65px;">Tempo</th>
      <th style="width:80px;">Unidade</th><th style="width:110px;">Val. Unit.</th>
      <th style="width:110px;">Total</th><th></th>
    </tr>`;
  } else if (docServ === 'material') {
    thead.innerHTML = `<tr>
      <th>#</th><th>Descrição</th>
      <th style="width:55px;">Qtd</th><th style="width:110px;">Val. Unit.</th>
      <th style="width:110px;">Total</th><th></th>
    </tr>`;
  } else {
    thead.innerHTML = `<tr>
      <th>#</th><th style="width:80px;">Tipo</th>
      <th>Técnico / Descrição</th>
      <th style="width:55px;">Qtd</th><th style="width:65px;">Tempo</th>
      <th style="width:110px;">Val. Unit.</th>
      <th style="width:110px;">Total</th><th></th>
    </tr>`;
  }
}

function adicionarItem() {
  const novoItem = {
    _id:       'new_' + Date.now(),
    item_tipo: docServ === 'material' ? 'material' : 'mao',
    tecnico_id: '', descricao: '',
    qtd: 1, tempo: 1, unidade: 'horas',
    valor_unit: 0, total: 0
  };
  itens.push(novoItem);
  renderItens();
}

function removerItem(lid) {
  itens = itens.filter(i => i._id !== lid);
  renderItens();
  calcTotais();
}

function renderItens() {
  const tbody = document.getElementById('items-body');
  tbody.innerHTML = '';

  itens.forEach((item, idx) => {
    const tr = document.createElement('tr');
    const lid = item._id;

    if (docServ === 'mao') {
      tr.innerHTML = `
        <td style="color:var(--steel2);width:24px;font-size:12px;">${idx+1}</td>
        <td>${tecSelect(lid, item.tecnico_id)}</td>
        <td><input type="number" value="${item.qtd}" min="1" style="width:52px;"
            oninput="updateItem('${lid}','qtd',this.value)"></td>
        <td><input type="number" value="${item.tempo}" min="0.5" step="0.5" style="width:60px;"
            oninput="updateItem('${lid}','tempo',this.value)"></td>
        <td>${undSelect(lid, item.unidade)}</td>
        <td><input type="number" value="${item.valor_unit}" step="0.01" style="width:105px;"
            oninput="updateItem('${lid}','valor_unit',this.value)" id="vu_${lid}"></td>
        <td class="item-total" id="tot_${lid}">${fmtNum(item.total)}</td>
        <td><button class="item-del" onclick="removerItem('${lid}')">×</button></td>`;
    } else if (docServ === 'material') {
      tr.innerHTML = `
        <td style="color:var(--steel2);width:24px;font-size:12px;">${idx+1}</td>
        <td><input type="text" value="${item.descricao||''}" placeholder="Descrição do material"
            oninput="updateItem('${lid}','descricao',this.value)"></td>
        <td><input type="number" value="${item.qtd}" min="1" style="width:52px;"
            oninput="updateItem('${lid}','qtd',this.value)"></td>
        <td><input type="number" value="${item.valor_unit}" step="0.01" style="width:105px;"
            oninput="updateItem('${lid}','valor_unit',this.value)"></td>
        <td class="item-total" id="tot_${lid}">${fmtNum(item.total)}</td>
        <td><button class="item-del" onclick="removerItem('${lid}')">×</button></td>`;
    } else {
      // Misto
      const isMao = item.item_tipo === 'mao';
      tr.innerHTML = `
        <td style="color:var(--steel2);width:24px;font-size:12px;">${idx+1}</td>
        <td>
          <select style="width:80px;font-size:12px;padding:6px;"
              onchange="updateItem('${lid}','item_tipo',this.value);renderItens();">
            <option value="mao"      ${isMao      ?'selected':''}>M-de-O</option>
            <option value="material" ${!isMao?'selected':''}>Material</option>
          </select>
        </td>
        <td>${isMao
          ? tecSelect(lid, item.tecnico_id)
          : `<input type="text" value="${item.descricao||''}" placeholder="Descrição"
               oninput="updateItem('${lid}','descricao',this.value)">`
        }</td>
        <td><input type="number" value="${item.qtd}" min="1" style="width:52px;"
            oninput="updateItem('${lid}','qtd',this.value)"></td>
        <td>${isMao
          ? `<input type="number" value="${item.tempo}" step="0.5" style="width:60px;"
               oninput="updateItem('${lid}','tempo',this.value)">`
          : `<span style="color:var(--steel2);font-size:12px;">Und</span>`
        }</td>
        <td><input type="number" value="${item.valor_unit}" step="0.01" style="width:105px;"
            oninput="updateItem('${lid}','valor_unit',this.value)" id="vu_${lid}"></td>
        <td class="item-total" id="tot_${lid}">${fmtNum(item.total)}</td>
        <td><button class="item-del" onclick="removerItem('${lid}')">×</button></td>`;
    }
    tbody.appendChild(tr);
  });
}

function tecSelect(lid, val) {
  const opts = tecnicos.map(t =>
    `<option value="${t.id}" ${t.id===val?'selected':''}>${t.nome}</option>`
  ).join('');
  return `<select onchange="updateItem('${lid}','tecnico_id',this.value);autoTarifa('${lid}')">
    <option value="">— Técnico —</option>${opts}</select>`;
}

function undSelect(lid, val) {
  return `<select onchange="updateItem('${lid}','unidade',this.value)" style="width:78px;">
    <option value="horas" ${val==='horas'?'selected':''}>horas</option>
    <option value="hora"  ${val==='hora' ?'selected':''}>hora</option>
    <option value="dias"  ${val==='dias' ?'selected':''}>dias</option>
    <option value="Unt"   ${val==='Unt'  ?'selected':''}>Unt</option>
  </select>`;
}

function autoTarifa(lid) {
  const item = itens.find(i => i._id === lid);
  if (!item?.tecnico_id) return;
  const tec = tecnicos.find(t => t.id === item.tecnico_id);
  if (!tec) return;
  item.valor_unit = docMoeda === 'USD' ? (tec.tarifa_usd||0) : (tec.tarifa_mzn||0);
  const el = document.getElementById('vu_' + lid);
  if (el) el.value = item.valor_unit;
  calcItemTotal(item);
  calcTotais();
  const totEl = document.getElementById('tot_' + lid);
  if (totEl) totEl.textContent = fmtNum(item.total);
}

function updateItem(lid, campo, valor) {
  const item = itens.find(i => i._id === lid);
  if (!item) return;
  if (['qtd','tempo','valor_unit'].includes(campo)) item[campo] = parseFloat(valor) || 0;
  else item[campo] = valor;
  calcItemTotal(item);
  const totEl = document.getElementById('tot_' + lid);
  if (totEl) totEl.textContent = fmtNum(item.total);
  calcTotais();
}

function calcItemTotal(item) {
  const isMao = item.item_tipo === 'mao' || docServ === 'mao';
  const isMat = item.item_tipo === 'material' || docServ === 'material';
  if (isMat) {
    item.total = (item.qtd||1) * (item.valor_unit||0);
  } else {
    item.total = (item.qtd||1) * (item.tempo||1) * (item.valor_unit||0);
  }
}

// ── TOTAIS ────────────────────────────────────────────
function calcTotais() {
  const subtotal = itens.reduce((s, it) => s + (it.total||0), 0);
  const ivaPct   = parseFloat(getVal('iva-pct') || 16);
  const ivaAmt   = ivaOn ? subtotal * ivaPct / 100 : 0;
  const total    = subtotal + ivaAmt;
  const taxa     = parseFloat(getVal('taxa-cambio') || 64);
  const totalMZN = docMoeda === 'USD' ? total * taxa : total;

  document.getElementById('val-subtotal').textContent = fmtNum(subtotal) + ' ' + docMoeda;
  document.getElementById('label-total').textContent  = 'TOTAL ' + docMoeda;
  document.getElementById('val-total').textContent    = fmtNum(total) + ' ' + docMoeda;

  if (ivaOn) {
    document.getElementById('label-iva').textContent = `IVA (${ivaPct}%)`;
    document.getElementById('val-iva').textContent   = fmtNum(ivaAmt) + ' ' + docMoeda;
  }

  const equivEl = document.getElementById('equiv-usd');
  if (docMoeda === 'USD') {
    equivEl.style.display = 'block';
    equivEl.textContent   = `≈ ${fmtNum(totalMZN)} MZN (taxa: ${taxa})`;
  } else {
    equivEl.style.display = 'block';
    equivEl.textContent   = `≈ USD ${fmtNum(total / taxa)} (taxa: ${taxa})`;
  }

  document.getElementById('val-extenso').textContent = 'São: ' + numPorExtenso(totalMZN);
}

// ── GUARDAR ───────────────────────────────────────────
async function guardar(silencioso = false) {
  const numero = getVal('doc-numero').trim();
  const clinome = getVal('cli-nome').trim();
  if (!numero) { showToast('Insira o número do documento.', 'error'); return false; }
  if (!clinome) { showToast('Insira o nome do cliente.', 'error'); return false; }

  const taxa     = parseFloat(getVal('taxa-cambio') || 64);
  const ivaPct   = parseFloat(getVal('iva-pct') || 16);
  const subtotal = itens.reduce((s, it) => s + (it.total||0), 0);
  const ivaAmt   = ivaOn ? subtotal * ivaPct / 100 : 0;
  const total    = subtotal + ivaAmt;
  const totalMZN = docMoeda === 'USD' ? total * taxa : total;

  const utilId  = getVal('sel-utilizador');
  const util    = utilizadores.find(u => u.id === utilId);

  const docData = {
    tipo:             docTipo,
    numero,
    data:             getVal('doc-data'),
    ordem:            getVal('doc-ordem'),
    servico:          docServ,
    moeda:            docMoeda,
    taxa_cambio:      taxa,
    iva_incluido:     ivaOn,
    iva_pct:          ivaPct,
    cliente_nome:     clinome,
    cliente_morada:   getVal('cli-morada'),
    cliente_nuit:     getVal('cli-nuit'),
    cliente_contacto: getVal('cli-contacto'),
    enviado_nome:     getVal('cli-env-nome'),
    enviado_cargo:    getVal('cli-env-cargo'),
    assunto:          getVal('doc-assunto'),
    nota:             getVal('doc-nota'),
    subtotal,
    iva_amt:          ivaAmt,
    total,
    total_mzn:        totalMZN,
    utilizador_id:    utilId || null,
    utilizador_nome:  util?.nome || '',
    utilizador_cargo: util?.cargo || '',
    atualizado_em:    new Date().toISOString()
  };

  try {
    let savedDoc;
    if (docId) {
      const res = await db.update('documentos', docId, docData);
      savedDoc = res[0];
    } else {
      const res = await db.insert('documentos', docData);
      savedDoc  = res[0];
      docId     = savedDoc.id;
      todosDocumentos.push(savedDoc);
    }

    // Guardar itens — apagar antigos e reinserir
    await fetch(`${SUPABASE_URL}/rest/v1/documento_itens?documento_id=eq.${docId}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });

    if (itens.length > 0) {
      const itensBD = itens.map((it, idx) => {
        const tec = tecnicos.find(t => t.id === it.tecnico_id);
        return {
          documento_id: docId,
          ordem:        idx,
          item_tipo:    it.item_tipo || (docServ === 'material' ? 'material' : 'mao'),
          tecnico_id:   it.tecnico_id || null,
          tecnico_nome: tec?.nome || null,
          descricao:    it.descricao || null,
          qtd:          it.qtd || 1,
          tempo:        it.tempo || 1,
          unidade:      it.unidade || 'horas',
          valor_unit:   it.valor_unit || 0,
          total:        it.total || 0
        };
      });
      await db.insert('documento_itens', itensBD);
    }

    // Actualizar badge
    document.getElementById('estado-badge').textContent = '✅ Guardado';
    document.getElementById('estado-badge').className   = 'estado-badge estado-guardado';
    document.getElementById('doc-id-label').style.display = 'inline';
    document.getElementById('doc-id-label').textContent   = `Nº ${numero}`;

    if (!silencioso) showToast('Documento guardado com sucesso!');
    return true;

  } catch (err) {
    console.error(err);
    showToast('Erro ao guardar. Verifica a ligação.', 'error');
    return false;
  }
}

async function guardarEImprimir() {
  const ok = await guardar(true);
  if (ok) {
    window.open(`print.html?id=${docId}`, '_blank');
  }
}

// Fechar modals ao clicar fora
window.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});
</script>
